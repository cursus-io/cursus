name: CodeQL Analysis

on:
  push:
    branches: [main, release-*]
    paths:
      - '.github/workflows/**'
      - 'go.mod'
      - 'go.sum'
      - 'broker.go'
      - 'cmd/**'
      - 'pkg/**'
      - 'sdk/**'
      - 'util/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'go.mod'
      - 'go.sum'
      - 'broker.go'
      - 'cmd/**'
      - 'pkg/**'
      - 'sdk/**'
      - 'util/**'
  schedule:
    - cron: '0 6 * * 1'

jobs:
  codeql:
    name: 🔬 CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: Build
        run: make build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
