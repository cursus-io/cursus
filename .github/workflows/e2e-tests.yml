name: E2E Tests

on:
  push:
    branches: [main, release-*]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'broker.go'
      - 'cmd/**'
      - 'pkg/**'
      - 'test/**'
      - 'util/**'
  pull_request:
    branches: [main, release-*]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'broker.go'
      - 'cmd/**'
      - 'pkg/**'
      - 'test/**'
      - 'util/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true

      - name: Run E2E tests
        run: make e2e
