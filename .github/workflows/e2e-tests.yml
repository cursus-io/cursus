name: E2E Tests

on:
  push:
    branches: [main, release-*]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'broker.go'
      - 'cmd/**'
      - 'pkg/**'
      - 'test/**'
      - 'util/**'
  pull_request:
    branches: [main, release-*]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'broker.go'
      - 'cmd/**'
      - 'pkg/**'
      - 'test/**'
      - 'util/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - name: Run E2E tests
        run: make e2e

      - name: Run E2E benchmark tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RUN_E2E_BENCHMARK: "1"
        run: |
          go test -v -timeout 30m ./test/e2e-benchmark/...
  topic-storage-fault-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - name: Run topic storage fault reconciliation E2E
        env:
          RUN_E2E_TOPIC_STORAGE_FAULTS: "1"
        run: |
          go test -v -timeout 20m ./test/e2e-cluster/... -run '^TestTopicStorageFaultReconciliation$' -count=1

      - name: Show fault cluster logs on failure
        if: failure()
        working-directory: test/e2e-cluster
        run: docker compose -f docker-compose.yml -f docker-compose.faults.yml logs --no-color

      - name: Clean fault cluster environment
        if: always()
        working-directory: test/e2e-cluster
        run: docker compose -f docker-compose.yml -f docker-compose.faults.yml down -v --remove-orphans
