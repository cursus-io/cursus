name: E2E Tests

on:
  push:
    branches: [main, release-*]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'broker.go'
      - 'cmd/**'
      - 'pkg/**'
      - 'test/**'
      - 'util/**'
  pull_request:
    branches: [main, release-*]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'broker.go'
      - 'cmd/**'
      - 'pkg/**'
      - 'test/**'
      - 'util/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - name: Run E2E tests
        run: make e2e

      - name: Run E2E benchmark tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RUN_E2E_BENCHMARK: "1"
        run: |
          go test -v -timeout 30m ./test/e2e-benchmark/...

  raft-snapshot-restore:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - name: Run Raft snapshot restore E2E
        env:
          RUN_E2E_RAFT_SNAPSHOT: "1"
        run: |
          go test -v -count=1 -timeout 20m ./test/e2e-cluster \
            -run '^TestRaftSnapshotRestorePreservesAndAdvancesTopicState$'

      - name: Show Raft snapshot compose logs
        if: failure()
        working-directory: test/e2e-cluster
        run: |
          docker compose -p cursus-snapshot-e2e \
            -f docker-compose.yml -f docker-compose.snapshot.yml \
            logs --no-color

      - name: Clean up Raft snapshot compose
        if: always()
        working-directory: test/e2e-cluster
        run: |
          docker compose -p cursus-snapshot-e2e \
            -f docker-compose.yml -f docker-compose.snapshot.yml \
            down -v --remove-orphans
