name: E2E Tests

on:
  push:
    branches: [main, release-*]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'broker.go'
      - 'cmd/**'
      - 'pkg/**'
      - 'test/**'
      - 'util/**'
  pull_request:
    branches: [main, release-*]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'broker.go'
      - 'cmd/**'
      - 'pkg/**'
      - 'test/**'
      - 'util/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - name: Run E2E tests
        run: make e2e

      - name: Run E2E benchmark tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          go test -v -timeout 30m ./test/e2e-benchmark/...