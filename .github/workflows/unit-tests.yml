name: Unit Tests

on:
  push:
    branches: [main, release-*]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'broker.go'
      - 'cmd/**'
      - 'pkg/**'
      - 'sdk/**'
      - 'test/**'
      - 'util/**'
      - 'codecov.yml'
  pull_request:
    branches: [main, release-*]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'broker.go'
      - 'cmd/**'
      - 'pkg/**'
      - 'sdk/**'
      - 'test/**'
      - 'util/**'
      - 'codecov.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - name: Run tests with coverage
        run: make coverage
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - run: make build
