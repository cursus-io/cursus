services:
  broker-1:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: broker-1
    command: ./broker
    environment:
      - CONFIG_PATH=/root/config.yaml
      - ADVERTISED_HOST=broker-1
      - RAFT_PORT=9001
      - DISCOVERY_PORT=8000
    ports:
      - "9001:9000"
      - "8000:8000"
      - "9081:9080"
    volumes:
      - ../cluster/config.yaml:/root/config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/health"]
      interval: 3s
      timeout: 1s
      retries: 3
    networks:
      - cluster_network

  broker-2:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: broker-2
    command: ./broker
    environment:
      - CONFIG_PATH=/root/config.yaml
      - ADVERTISED_HOST=broker-2
      - RAFT_PORT=9001
      - DISCOVERY_PORT=8000
    ports:
      - "9002:9000"
      - "8001:8000"
      - "9082:9080"
    volumes:
      - ../cluster/config.yaml:/root/config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/health"]
      interval: 3s
      timeout: 1s
      retries: 3
    depends_on:
      broker-1:
        condition: service_healthy
    networks:
      - cluster_network

  broker-3:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: broker-3
    command: ./broker
    environment:
      - CONFIG_PATH=/root/config.yaml
      - ADVERTISED_HOST=broker-3
      - RAFT_PORT=9001
      - DISCOVERY_PORT=8000
    ports:
      - "9003:9000"
      - "8002:8000"
      - "9083:9080"
    volumes:
      - ../cluster/config.yaml:/root/config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/health"]
      interval: 3s
      timeout: 1s
      retries: 3
    depends_on:
      broker-1:
        condition: service_healthy
    networks:
      - cluster_network

networks:
  cluster_network:
    name: cluster_network
