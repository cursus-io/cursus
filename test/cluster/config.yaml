broker_port: 9000
health_check_port: 9080
enable_exporter: true
exporter_port: 9100
log_level: "info"

# Distributed Clustering
enabled_distribution: true
raft_port: 9001
discovery_port: 8000
min_insync_replicas: 1 
bootstrap_cluster: true
static_cluster_members: 
  - "broker-1-9000@broker-1:9001"
  - "broker-2-9000@broker-2:9001"
  - "broker-3-9000@broker-3:9001"

# Idempotency
enable_idempotence: false

# Disk storage and performance
log_dir: "cluster-logs"
linger_ms: 100
disk_flush_batch_size: 10000            
channel_buffer_size: 100000
partition_channel_buffer_size: 100000
broadcast_channel_buffer_size: 100000
log_cleanup_interval: 300
log_segment_bytes: 1073741824 # 1GB

# Consumer session management
consumer_session_timeout_ms: 30000
consumer_heartbeat_check_ms: 5000
