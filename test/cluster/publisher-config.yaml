#  Publisher
broker_addrs:  
  - "broker-1:9000"
  - "broker-2:9000"
  - "broker-3:9000"
log_level: "info"

# Performance
num_messages: 100000
partitions: 12
max_inflight_requests: 20
batch_size: 1000
linger_ms: 50
buffer_size: 100000

# Reliability
acks: "1"
enable_idempotence: false

max_retries: 5
retry_backoff_ms: 200

enable_benchmark: true
